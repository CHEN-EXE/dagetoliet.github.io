<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>发布系统</title>

  <!-- Element Plus 样式（建议锁定版本） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.13.3/dist/index.css" />

  <style>
    :root {
      --gold: #555;
      --bg: #ffffff;
      --muted: #666;
      --header-bg: #111;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      line-height: 1.6;
      color: #333;
      background: var(--bg);
    }

    header {
      background: var(--header-bg);
      color: #fff;
      padding: 14px 5%;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .section {
      padding: 28px 10%;
      max-width: 980px;
      margin: 0 auto;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
    }

    .form-card {
      margin-top: 16px;
    }

    .resp-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #0b1020;
      color: #e6e6e6;
      overflow: auto;
      max-height: 280px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .section { padding: 20px 5%; }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">大哥系列贡献提交平台</div>
  </header>

  <div id="app">
    <section class="section">
      <h1 style="margin: 0;">大是哥餐馆</h1>
      <div class="subtitle">新增菜品</div>

      <el-alert
        style="margin-top: 12px;"
        title="大哥全成系列现已支持数据库存储，可随时新增数据。要求不能包含真实姓名以及大哥本人大头照！"
        type="info"
        show-icon
        :closable="false"
      ></el-alert>

      <el-card class="form-card" shadow="never">
        <template v-slot:header>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div style="font-weight: 700;">提交菜品信息</div>
            <div style="color:#888; font-size:12px;">无需审核 一键提交</div>
          </div>
        </template>

        <el-form
          ref="formRef"
          :model="form"
          :rules="rules"
          label-position="top"
          status-icon
        >
          <h4 style="margin: 0 0 10px;">数据</h4>

          <el-form-item label="菜品名称" prop="dish_name">
            <el-input
              v-model="form.dish_name"
              placeholder="例如：红烧牛肉面"
              maxlength="30"
              show-word-limit
            ></el-input>
          </el-form-item>

          <el-form-item label="菜品图标（emoji）" prop="dish_emoji">
            <el-input
              v-model="form.dish_emoji"
              placeholder="例如：🍜"
              maxlength="4"
              show-word-limit
            ></el-input>
          </el-form-item>

          <el-form-item label="菜品介绍" prop="dish_desc">
            <el-input
              v-model="form.dish_desc"
              type="textarea"
              :rows="4"
              placeholder="简单介绍一下这道菜（口味、分量、推荐人群等）"
              maxlength="300"
              show-word-limit
            ></el-input>
          </el-form-item>

          <el-divider></el-divider>

          <h4 style="margin: 0 0 10px;">个人信息</h4>

          <el-form-item label="昵称（禁止真实姓名）" prop="nickname">
            <el-input
              v-model="form.nickname"
              placeholder="例如：大哥粉丝001 / 代号A7 / 匿名用户"
              maxlength="20"
              show-word-limit
            ></el-input>
          </el-form-item>

          <el-form-item label="key" prop="key">
            <el-input
              v-model="form.key"
              type="password"
              show-password
              placeholder="请输入 key"
              maxlength="64"
            ></el-input>
          </el-form-item>

          <el-form-item>
            <el-space wrap>
              <el-button type="primary" :loading="loading" @click="submitForm">
                提交预约
              </el-button>
              <el-button :disabled="loading" @click="clearForm">
                清空表单
              </el-button>
              <el-button :disabled="loading" @click="fillDemo">
                填入示例
              </el-button>
            </el-space>
          </el-form-item>

          <el-alert
            v-if="serverMessage"
            style="margin-top: 12px;"
            :title="serverMessage"
            :type="serverOk ? 'success' : 'error'"
            show-icon
            :closable="true"
            @close="serverMessage='';"
          ></el-alert>

          <div v-if="serverRaw" class="resp-box">{{ serverRaw }}</div>
        </el-form>
      </el-card>
    </section>
  </div>

  <!-- Vue 3（全局构建） -->
  <script src="https://unpkg.com/vue@3.5.29/dist/vue.global.prod.js"></script>

  <!-- Element Plus（全量全局构建） -->
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.13.3/dist/index.full.min.js"></script>

  <!-- Element Plus 简体中文语言包（官方 i18n CDN 用法） -->
  <script src="https://unpkg.com/element-plus@2.13.3/dist/locale/zh-cn"></script>

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.13.6/dist/axios.min.js"></script>

  <script>
    const { createApp, ref, reactive } = Vue;

    createApp({
      setup() {
        const formRef = ref(null);
        const loading = ref(false);

        const serverOk = ref(false);
        const serverMessage = ref("");
        const serverRaw = ref("");

        const form = reactive({
          dish_name: "",
          dish_emoji: "",
          dish_desc: "",
          nickname: "",
          key: ""
        });

        // 前端校验：注意“不能包含真实姓名”无法 100% 自动判断，这里做了一个很保守的“疑似中文真名”拦截示例
        const rules = {
          dish_name: [
            { required: true, message: "请输入菜品名称", trigger: "blur" },
            { min: 2, max: 30, message: "长度需 2-30 个字符", trigger: "blur" }
          ],
          dish_emoji: [
            { required: true, message: "请输入菜品图标（emoji）", trigger: "blur" },
            {
              validator: (rule, value, callback) => {
                if (!value) return callback();
                // 需要浏览器支持 Unicode 属性类（现代浏览器基本支持）
                try {
                  if (!/[\p{Extended_Pictographic}]/u.test(value)) {
                    return callback(new Error("请至少包含一个 emoji（例如：🍜）"));
                  }
                } catch (e) {
                  // 兜底：不支持则只检查非空
                }
                if (value.length > 4) return callback(new Error("emoji 太长了"));
                callback();
              },
              trigger: "blur"
            }
          ],
          dish_desc: [
            { required: true, message: "请输入菜品介绍", trigger: "blur" },
            { min: 5, max: 300, message: "长度需 5-300 个字符", trigger: "blur" }
          ],
          nickname: [
            { required: true, message: "请输入昵称（不要真实姓名）", trigger: "blur" },
            { min: 2, max: 20, message: "长度需 2-20 个字符", trigger: "blur" },
            {
              validator: (rule, value, callback) => {
                if (!value) return callback();
                // “纯 2-4 个中文字符”常见于真名，这里直接拦截（你也可以按业务放宽/改成提示）
                if (/^[\u4e00-\u9fa5]{2,4}$/.test(value)) {
                  return callback(new Error("请使用昵称/代号，避免真实姓名"));
                }
                callback();
              },
              trigger: "blur"
            }
          ],
          key: [
            { required: true, message: "请输入 key", trigger: "blur" },
            { min: 4, max: 64, message: "长度需 4-64", trigger: "blur" }
          ]
        };

        const clearForm = () => {
          serverMessage.value = "";
          serverRaw.value = "";
          serverOk.value = false;
          if (formRef.value) formRef.value.resetFields();
        };

        const fillDemo = () => {
          form.dish_name = "招牌牛肉面";
          form.dish_emoji = "🍜";
          form.dish_desc = "牛肉软烂入味，汤头浓郁微辣，适合喜欢重口的朋友。";
          form.nickname = "大哥粉丝001";
          form.key = "demo-key";
        };

        const submitForm = async () => {
          if (!formRef.value) return;

          serverMessage.value = "";
          serverRaw.value = "";
          serverOk.value = false;

          try {
            await formRef.value.validate();
          } catch (e) {
            ElementPlus.ElMessage.warning("请先修正表单中的错误");
            return;
          }

          loading.value = true;
          try {
            // 发送 JSON 到 PHP（PHP 端需要能读 php://input）
            const res = await axios.post("./index.php", form, {
              headers: { "Content-Type": "application/json" },
              timeout: 15000
            });

            // 支持 PHP 返回 JSON 或纯文本
            if (typeof res.data === "string") {
              serverOk.value = true;
              serverMessage.value = "提交成功（服务器返回文本）";
              serverRaw.value = res.data;
              ElementPlus.ElMessage.success("提交成功");
            } else {
              const data = res.data || {};
              serverOk.value = !!data.success;
              serverMessage.value = data.message || (data.success ? "提交成功" : "提交失败");
              serverRaw.value = JSON.stringify(data, null, 2);

              if (data.success) {
                ElementPlus.ElMessage.success(serverMessage.value);
                // 只清空表单，不清空“服务器返回”
                if (formRef.value) formRef.value.resetFields();
              } else {
                ElementPlus.ElMessage.error(serverMessage.value);
              }
            }
          } catch (err) {
            console.error(err);
            const resp = err && err.response ? err.response.data : null;
            const msg =
              (resp && resp.message) ||
              (err && err.message) ||
              "网络错误 / 服务器错误";

            serverOk.value = false;
            serverMessage.value = msg;
            serverRaw.value = typeof resp === "string" ? resp : (resp ? JSON.stringify(resp, null, 2) : "");

            ElementPlus.ElMessage.error(msg);
          } finally {
            loading.value = false;
          }
        };

        return {
          formRef,
          form,
          rules,
          loading,
          serverOk,
          serverMessage,
          serverRaw,
          submitForm,
          clearForm,
          fillDemo
        };
      }
    })
    // Element Plus 官方：CDN 国际化用 ElementPlusLocaleZhCn 注入 :contentReference[oaicite:3]{index=3}
    .use(ElementPlus, { locale: ElementPlusLocaleZhCn })
    .mount("#app");
  </script>
</body>
</html>
