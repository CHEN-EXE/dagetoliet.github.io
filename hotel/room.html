<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大哥国际酒店 | 客房预约</title>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" ></script>

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
  
    <style>
        /* 核心样式设置 */
        :root {
            --gold: #c5a059;
            --dark-blue: #1a2a3a;
            --light-gray: #f8f9fa;
            --text-gray: #555;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background-color: #fff;
        }

        /* 导航栏 */
        header {
            background-color: var(--dark-blue);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* 英雄海报区 */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* 酒店详细介绍 */
        .section {
            padding: 4rem 10%;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-title h2 {
            font-size: 2rem;
            color: var(--dark-blue);
        }

        .section-title::after {
            content: "";
            display: block;
            width: 50px;
            height: 3px;
            background: var(--gold);
            margin: 10px auto;
        }

        .intro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--light-gray);
            padding: 2rem;
            border-radius: 8px;
            border-bottom: 4px solid transparent;
            transition: 0.3s;
        }

        .card:hover {
            border-bottom: 4px solid var(--gold);
            transform: translateY(-5px);
        }

        .card h3 {
            color: var(--gold);
            margin-top: 0;
        }

        /* 设施列表 */
        .amenities {
            background-color: var(--dark-blue);
            color: white;
        }

        .amenities-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .amenity-item {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }

        /* 页脚标注 */
        footer {
            background-color: #111;
            color: #888;
            padding: 2rem 5%;
            text-align: center;
            font-size: 0.85rem;
            border-top: 1px solid #333;
        }

        .footer-nav {
            margin-bottom: 15px;
        }

        .footer-nav a {
            color: #888;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-label {
            color: var(--gold);
            margin-top: 10px;
            font-weight: bold;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            header { flex-direction: column; gap: 10px; }
            nav a { margin: 0 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">大哥国际酒店</div>
    </header>
 <section id="about" class="section">
   <h1>客房预约</h1>
   
   <div class="alert alert-primary" role="alert">
  欢迎预约我们的客房！我们已经排除了已入住客房，现在可选的都是空余/即将空余客房。
</div>

<select class="form-select" aria-label="Default select example">
  <option selected>选择空余房号</option>
  <option value="1">001</option>
  <option value="2">019</option>
  <option value="3">008</option>
</select><br>
<div class="input-group mb-3">
  <input type="text" class="form-control" placeholder="年份+日期+时间" aria-label="Username">
  <span class="input-group-text">—</span>
  <input type="text" class="form-control" placeholder="年份+日期+时间" aria-label="Server">
</div>

<br>
<h4>联络</h4>
<div class="form-check">
  <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
  <label class="form-check-label" for="flexCheckDefault">
    到时间后邮件/电话提醒我
  </label>
</div>

<div class="input-group mb-3">
  <input type="text" class="form-control" placeholder="邮箱前缀" aria-label="Username">
  <span class="input-group-text">@</span>
  <input type="text" class="form-control" placeholder="邮箱后缀" aria-label="Server">
</div>

<div class="input-group mb-3">
  <div class="input-group-text">
    <input class="form-check-input mt-0" type="checkbox" value="" aria-label="Checkbox for following text input"> 电话号码
  </div>
  <input type="text" class="form-control" aria-label="Text input with checkbox">
</div><br>
<h4>称呼及其信息</h4>
<div class="input-group">
  <span class="input-group-text">姓名</span>
  <input type="text" aria-label="First name" class="form-control">
  <input type="text" aria-label="Last name" class="form-control">
</div>
<br>
<div class="form-floating mb-3">
  <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
  <label for="floatingInput">全成网络科技账户名</label>
</div>
<div class="form-floating">
  <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
  <label for="floatingPassword">密钥</label>
</div>
<br>
  <div class="col-12">
    
    <div id="liveAlertPlaceholder"></div>
<button type="button" class="btn btn-primary" id="liveAlertBtn">提交预约</button>
    
  </div>
  
 </section>
</body>
<script>
  const alertPlaceholder = document.getElementById('liveAlertPlaceholder')

const alert = (message, type) => {
  const wrapper = document.createElement('div')
  wrapper.innerHTML = [
    `<div class="alert alert-${type} alert-dismissible" role="alert">`,
    `   <div>${message}</div>`,
    '   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
    '</div>'
  ].join('')

  alertPlaceholder.append(wrapper)
}

const alertTrigger = document.getElementById('liveAlertBtn')
if (alertTrigger) {
  alertTrigger.addEventListener('click', () => {
    alert('我们已经收到申请！将在24小时内电话回访或者邮箱提醒。', 'success')
  })
}
</script>
</html>
