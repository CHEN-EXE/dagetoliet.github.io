      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
      
  <style>
        /* 基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Georgia", "Times New Roman", serif; line-height: 1.6; color: #333; }
        
        /* 康奈尔红主题色 */
        :root { --wcu-red: #B31B1B; --wcu-dark: #222; --wcu-gray: #f5f5f5; }
        
        /* 顶部导航 */
        header { background: var(--wcu-red); color: white; position: sticky; top: 0; z-index: 1000; }
        .nav-top { background: rgba(0,0,0,0.2); padding: 8px 0; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .nav-top a { color: white; text-decoration: none; margin-right: 20px; opacity: 0.9; }
        .nav-top a:hover { opacity: 1; text-decoration: underline; }
        
        /* 主导航 */
        .nav-main { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 1px; }
        .logo span { font-weight: normal; opacity: 0.9; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-size: 16px; font-weight: 500; transition: opacity 0.3s; }
        .nav-links a:hover { opacity: 0.8; }
        
        /* Hero区域 */
        .hero { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><rect fill="%23666" width="1200" height="600"/><text fill="%23999" font-size="40" x="50%" y="50%" text-anchor="middle">滚木</text></svg>'); background-size: cover; background-position: center; height: 600px; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero-content h1 { font-size: 56px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 24px; margin-bottom: 30px; font-style: italic; }
        /* 特色区域 */
        .features { padding: 80px 0; background: white; }
        .section-title { text-align: center; font-size: 36px; margin-bottom: 50px; color: var(--wcu-dark); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: var(--wcu-gray); padding: 40px; border-radius: 5px; text-align: center; transition: transform 0.3s; border-top: 4px solid var(--wcu-red); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card h3 { color: var(--wcu-red); font-size: 24px; margin-bottom: 15px; }
        .card p { color: #666; line-height: 1.8; }
        
        /* 新闻区域 */
        .news { padding: 20px 0; background: var(--wcu-gray); }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .news-item { width:auto;background: white; overflow: hidden; border-radius: 5px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .news-content { padding: 25px; }
        .news-content h4 { color: var(--wcu-red); font-size: 20px; margin-bottom: 10px; }
        .news-content .date { color: #999; font-size: 14px; margin-bottom: 10px; }
        
        /* Footer */
        footer { background: var(--wcu-dark); color: white; padding: 60px 0 30px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; margin-bottom: 40px; }
        .footer-section h4 { color: var(--wcu-red); margin-bottom: 20px; font-size: 18px; }
        .footer-section ul { list-style: none; }
        .footer-section ul li { margin-bottom: 10px; }
        .footer-section a { color: #aaa; text-decoration: none; transition: color 0.3s; }
        .footer-section a:hover { color: white; }
        .footer-bottom { text-align: center; padding-top: 30px; border-top: 1px solid #444; color: #777; font-size: 14px; }
        .disclaimer { background: rgba(179, 27, 27, 0.2); border: 1px solid var(--wcu-red); padding: 15px; margin-top: 20px; border-radius: 5px; color: #ff9999; font-weight: bold; }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-content h1 { font-size: 36px; }
            .hero { height: 400px; }
        }

          color:#fff;
        }
        a{
          color:#ff2d2ddf;
        }
    </style>
