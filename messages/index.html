<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主会场</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:rgb(18,120,225);
  --card:rgb(18,120,225);
  --gold:#fff;
  --text:#fff;
  --radius:10px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Noto Sans SC';
  background:rgb(18,120,225);
  color:var(--text);
  min-height:100vh;
}

header{
  text-align:center;
  padding:40px 20px;
}

header h1{
  font-size:2.6rem;
  color:var(--gold);
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

#gift-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{
  background:0;
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.card h3{
  color:var(--gold);
  margin-bottom:10px;
}

.card p{
  opacity:.9;
  margin-bottom:20px;
}

.btn{
  background:linear-gradient(135deg,#ffd700,#ffb700);
  border:none;
  color:#7a0000;
  padding:14px;
  width:100%;
  border-radius:18px;
  font-weight:700;
  cursor:pointer;
}

.btn:disabled{
  opacity:.5;
}

#form{
  display:none;
  background:linear-gradient();
  padding:35px;
  border-radius:var(--radius);
  max-width:450px;
  margin:30px auto;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:18px;
  border:none;
  border-radius:14px;
}

#toast{
  display:none;
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:var(--gold);
  color:#7a0000;
  padding:10px 30px;
  border-radius:12px;
  font-weight:700;
}
.cover{
  font-size: 14px;
  position: absolute;
  border:none;
  top:30px;
  background-color: #ffd700;
  color:#000;
  border-top-left-radius: 10px;
  padding:2px;
  right:1px;
  border-bottom-left-radius: 10px;
}
.cover2{
  font-size: 14px;
  position: absolute;
  border:none;
  top:60px;
  background-color: #ffd700;
  color:#000;
  border-top-left-radius: 10px;
  padding:2px;
  right:1px;
  border-bottom-left-radius: 10px;
}
</style>
</head>

<body>
<a href="./rules.html" class="cover">活動規則</a>
<button onclick="cluser()" class="cover2">Cookie</button>
<header>
  <h2>大哥國際廁所集團 活動</h2>
  <p id="hello"></p>
</header>

<div class="container">

  <div id="gift-container">
    <div class="card">
      <h3>📅 每日簽到</h3>
      <p>領取金幣</p>
      <button class="btn" id="signBtn" onclick="signIn()">立即簽到</button>
    </div>

    <div class="card">
      <h3>🎁 幸運抽獎</h3>
      <p>簽到100金幣後可抽獎一次</p>
      <button class="btn" id="lotteryBtn" onclick="lottery()">抽獎</button>
    </div>

    <div class="card">
      <h3>🛒 最新福利</h3>
      <p>全程科技研發 智能5GHz路由器</p>
      <button class="btn" onclick="openForm()">預約購買</button>
    </div>
  </div>

  <div id="form">
    <h3 style="color:var(--gold);margin-bottom:20px">填寫收貨信息</h3>
    <input id="user" placeholder="收貨人">
    <input id="addr" placeholder="收貨地址">
    <button class="btn" onclick="buy()">確認</button>
  </div>

</div>

<div id="toast"></div>


<script>
/* DOM */
const hello = document.getElementById("hello")
const signBtn = document.getElementById("signBtn")
const lotteryBtn = document.getElementById("lotteryBtn")
const form = document.getElementById("form")
const giftBox = document.getElementById("gift-container")
const toast = document.getElementById("toast")
const userInput = document.getElementById("user")
const addrInput = document.getElementById("addr")

/* 用户名 */
const p = new URLSearchParams(location.search)
const name = p.get("user") || "未登录用户"
hello.textContent = `尊敬的 ${name}，欢迎您`

/* 状态 */
const today = new Date().toDateString()

function signIn(){
  if(localStorage.signDate === today){
    show("今日已签到")
    return
  }
  localStorage.signDate = today
  show("签到成功 +100 大哥币")
  signBtn.disabled = true
}

function lottery(){
  if(localStorage.signDate !== today){
    show("请先签到")
    return
  }
  if(localStorage.lottery === today){
    show("今日已抽")
    return
  }
  localStorage.lottery = today;
  const p = new URLSearchParams(location.search);
const name = p.get("user") || "未登录用户";
let prizes;
  if (name === "大哥"){
     prizes = ["现金红包100¥-100¥","大哥国际厕所集团免费送你10%"];
  } else {
 
  prizes = ["谢谢参与","谢谢参与","谢谢参与","大哥国际厕所集团免费送你10%","谢谢参与","谢谢参与","谢谢参与"];
  }
  show("抽中：" + prizes[Math.floor(Math.random()*prizes.length)]);
  lotteryBtn.disabled = true;
}

function openForm(){
  giftBox.style.display = "none"
  form.style.display = "block"
}

function buy(){
  if(!userInput.value || !addrInput.value){
    alert("请填写完整")
    return
  }
  show("支付成功")
  form.innerHTML = `<h3>申領成功</h3> `;
}

function show(msg){
  toast.textContent = msg
  toast.style.display = "block"
  setTimeout(()=>toast.style.display="none",2000)
}

/* 初始化 */
if(localStorage.signDate === today) signBtn.disabled = true
if(localStorage.lottery === today) lotteryBtn.disabled = true

   function cluser(){
        if (confirm("Clean the cookie?")) { 
localStorage.clear();
show("OK! Reload the browser.");
 }
    }
    
</script>

</body>
</html>
